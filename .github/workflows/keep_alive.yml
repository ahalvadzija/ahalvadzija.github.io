name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 
jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Send Pulse to Supabase (PUT Upsert)
        run: |
          # Koristimo PUT metodu sa ?id=eq.1
          # PUT ne baca 409 Conflict jer on "postavlja" stanje, ne pokušava samo "ubaciti"
          
          curl -f -i -X PUT "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?id=eq.1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Prefer: return=minimal" \
          -d "{\"id\": 1, \"last_ping\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}"